name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install numpy==1.24.4
        pip install pydantic==1.10.13
        pip install evidently==0.4.15
        pip install -r requirements.txt

    - name: Verify imports
      run: |
        python -c "import numpy, pandas, sklearn, fastapi; print('Imports OK')"

    - name: CI success check
      run: |
        python -c "print('CI SUCCESS')"